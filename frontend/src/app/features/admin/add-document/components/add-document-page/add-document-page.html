<!-- Yeni içerik ekleme: bento form + sabit aksiyon çubuğu (shell sidebar ayrı). -->
<div class="add-doc" @pageEnter>
  <div class="add-doc__scroll">
    <div class="add-doc__inner">
      <app-add-document-header (libraryClick)="goToLibrary()" />

      @if (loadError()) {
        <p class="add-doc__banner add-doc__banner--error" role="alert">{{ loadError() }}</p>
      }

      @if (submitError()) {
        <p class="add-doc__banner add-doc__banner--error" role="alert">{{ submitError() }}</p>
      }

      @if (fileError()) {
        <p class="add-doc__banner add-doc__banner--error" role="alert">{{ fileError() }}</p>
      }

      <div class="add-doc__grid">
        <div class="add-doc__main">
          <app-add-document-basic
            [title]="title()"
            [description]="description()"
            [showErrors]="showErrors()"
            (titleChange)="title.set($event)"
            (descriptionChange)="description.set($event)"
          />
          <app-add-document-upload
            [files]="files()"
            (filesChange)="files.set($event); fileError.set('')"
            (fileErrorChange)="fileError.set($event)"
          />
        </div>

        <div class="add-doc__side">
          <app-add-document-meta
            [category]="category()"
            [brandIds]="brandIds()"
            [publishedAt]="publishedAt()"
            [scheduledAt]="scheduledAt()"
            [expiresAt]="expiresAt()"
            [status]="status()"
            [recurrenceKind]="recurrenceKind()"
            [recurrenceDayOfWeek]="recurrenceDayOfWeek()"
            [recurrenceDayOfMonth]="recurrenceDayOfMonth()"
            [categories]="categoryOptions()"
            [allBrands]="brandOptions()"
            [showErrors]="showErrors()"
            (categoryChange)="category.set($event)"
            (brandIdsChange)="brandIds.set($event)"
            (publishedAtChange)="publishedAt.set($event)"
            (scheduledAtChange)="scheduledAt.set($event)"
            (expiresAtChange)="expiresAt.set($event)"
            (statusChange)="status.set($event)"
            (recurrenceKindChange)="recurrenceKind.set($event)"
            (recurrenceDayOfWeekChange)="recurrenceDayOfWeek.set($event)"
            (recurrenceDayOfMonthChange)="recurrenceDayOfMonth.set($event)"
          />
          @if (loadingMeta()) {
            <p class="add-doc__meta-loading">Marka ve kategoriler yükleniyor…</p>
          }
        </div>
      </div>
    </div>
  </div>

  <app-add-document-actions
    [saving]="saving()"
    (saveDraft)="saveDraft()"
    (save)="save()"
  />
</div>
