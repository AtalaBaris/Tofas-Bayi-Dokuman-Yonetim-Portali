<aside
  class="admin-sidebar"
  [class.admin-sidebar--mobile-open]="mobileOpen()"
  aria-label="Yönetim menüsü"
>
  <div class="admin-sidebar__brand">
    <div class="admin-sidebar__logo" aria-hidden="true">
      <span class="material-symbols-outlined">shield</span>
    </div>
    <div>
      <div class="admin-sidebar__brand-title">Bayi Portalı</div>
      <div class="admin-sidebar__brand-sub">Doküman Yönetimi</div>
    </div>
  </div>

  <div class="admin-sidebar__cta">
    <a
      class="admin-sidebar__upload"
      routerLink="/admin/documents/new"
      (click)="onNavClick()"
    >
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">add</span>
      Yeni Yükle
    </a>
  </div>

  <nav class="admin-sidebar__nav">
    @for (item of navItems; track item.label) {
      @if (item.link) {
        <a
          class="admin-sidebar__link"
          [routerLink]="item.link"
          routerLinkActive="admin-sidebar__link--active"
          (click)="onNavClick()"
        >
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      } @else {
        <span class="admin-sidebar__link admin-sidebar__link--disabled" title="Yakında">
          <span class="material-symbols-outlined">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </span>
      }
    }

    <div class="admin-sidebar__group">
      <button
        type="button"
        class="admin-sidebar__link admin-sidebar__group-trigger"
        [class.admin-sidebar__link--active]="usersMenuOpen()"
        [attr.aria-expanded]="usersMenuOpen()"
        aria-controls="admin-users-submenu"
        (click)="toggleUsersMenu()"
      >
        <span class="material-symbols-outlined">group</span>
        <span>Kullanıcılar</span>
        <span
          class="material-symbols-outlined admin-sidebar__chevron"
          [class.admin-sidebar__chevron--open]="usersMenuOpen()"
        >expand_more</span>
      </button>

      @if (usersMenuOpen()) {
        <div id="admin-users-submenu" class="admin-sidebar__submenu">
          <a
            class="admin-sidebar__sublink"
            routerLink="/admin/definitions/dealers"
            routerLinkActive="admin-sidebar__sublink--active"
            (click)="onNavClick()"
          >Bayiler</a>
          <a
            class="admin-sidebar__sublink"
            routerLink="/admin/definitions/brands"
            routerLinkActive="admin-sidebar__sublink--active"
            (click)="onNavClick()"
          >Markalar</a>
          <a
            class="admin-sidebar__sublink"
            routerLink="/admin/definitions/categories"
            routerLinkActive="admin-sidebar__sublink--active"
            (click)="onNavClick()"
          >Kategoriler</a>
        </div>
      }
    </div>

    <a
      class="admin-sidebar__link"
      routerLink="/admin/login-activity"
      routerLinkActive="admin-sidebar__link--active"
      (click)="onNavClick()"
    >
      <span class="material-symbols-outlined">login</span>
      <span>Giriş Kayıtları</span>
    </a>

    <span class="admin-sidebar__link admin-sidebar__link--disabled" title="Yakında">
      <span class="material-symbols-outlined">terminal</span>
      <span>Döküman İşlem Kaydı</span>
    </span>
  </nav>

  <div class="admin-sidebar__footer">
    <button type="button" class="admin-sidebar__link admin-sidebar__logout" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Çıkış Yap</span>
    </button>
  </div>
</aside>
