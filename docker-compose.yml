services:
  postgres:
    image: postgres:16
    container_name: bayi-portal-db
    environment:
      POSTGRES_USER: bayi
      POSTGRES_PASSWORD: bayi123
      POSTGRES_DB: BayiPortalDb
    # Host 5433: local Homebrew Postgres often occupies 5432
    ports:
      - "5433:5432"
    volumes:
      - bayi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bayi -d BayiPortalDb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bayi_pgdata:
